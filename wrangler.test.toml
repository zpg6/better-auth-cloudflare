# Wrangler configuration for local D1 testing via getPlatformProxy.
# Each binding provides a real SQLite-backed D1 instance via local persistence.
# Persistence path can be overridden via WRANGLER_PERSIST_DIR env var.
name = "better-auth-cloudflare-test"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "TEST_DB_0"
database_name = "test-db-0"
database_id = "00000000-0000-0000-0000-000000000000"

